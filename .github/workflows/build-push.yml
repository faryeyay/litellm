name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-and-push-local:
    # Builds a self-contained image with Ollama + a small model embedded.
    # Only runs on pushes to main (and version tags) to avoid slow CI on PRs.
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        model_name: [qwen2.5:0.5b]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize model name for Docker tag
        id: tag
        env:
          MODEL_NAME: ${{ matrix.model_name }}
        run: |
          MODEL_TAG=$(echo "${MODEL_NAME}" | tr ':.' '--')
          echo "model_tag=${MODEL_TAG}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (local image)
        id: meta-local
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,suffix=-local-${{ steps.tag.outputs.model_tag }}
            type=ref,event=branch,suffix=-local-${{ steps.tag.outputs.model_tag }}
            type=semver,pattern={{version}},suffix=-local-${{ steps.tag.outputs.model_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push local model image
        id: push-local
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          push: true
          build-args: MODEL_NAME=${{ matrix.model_name }}
          tags: ${{ steps.meta-local.outputs.tags }}
          labels: ${{ steps.meta-local.outputs.labels }}
          cache-from: type=gha,scope=local-${{ steps.tag.outputs.model_tag }}
          cache-to: type=gha,mode=max,scope=local-${{ steps.tag.outputs.model_tag }}

      - name: Generate artifact attestation (local image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push-local.outputs.digest }}
          push-to-registry: true
